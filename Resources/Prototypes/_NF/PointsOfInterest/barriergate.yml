# Notes:
# Deep player interest point POI.
- type: pointOfInterest
  id: BarrierGate
  parent: BasePOI
  name: 'Барьерные Врата [Нейтралитет]'
  minimumDistance: 1800
  maximumDistance: 2400
  # minimumClearance: 8000 # To make sure it doesn't pop in next to the Cove. Offline for now.
  spawnGroup: Required
  gridPath: /Maps/_NF/POI/barriergate.yml
  addComponents:
  - type: IFF
    color: "#dcfff7"
  - type: SolarPoweredGrid
    trackOnInit: true
    doNotCull: true
  - type: BiasTarget
    id: 'vgroid'

- type: gameMap
  id: BarrierGate
  mapName: 'Барьерные Врата [Нейтралитет]'
  mapPath: /Maps/_NF/POI/barriergate.yml
  minPlayers: 0
  stations:
    BarrierGate:
      stationProto: StandardFrontierOutpost
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Барьерные Врата [Нейтралитет]'
        - type: StationJobs
          availableJobs: {}
        - type: StationDeadDropHintExempt
